name: Maven Central Release

# Reusable, tag-driven release pipeline for eu.virtualparadox Maven projects.
#
# The GIT TAG is the single source of truth for the version: a tag `vX.Y.Z[-qualifier]`
# publishes exactly `X.Y.Z[-qualifier]` to Maven Central. `v1.0.1-RC1` -> 1.0.1-RC1 (a real,
# immutable pre-release on Central); `v1.0.1` -> 1.0.1 (final). Nothing is written back to the
# source pom — the version is set transiently for the build only. The full quality pipeline
# (all gates + tests + OWASP CVE scan + SBOM) runs before anything is signed and uploaded, so
# only artifacts that pass everything can ship.
#
# Usage from a consumer repo (.github/workflows/release.yml):
#   name: Release
#   on: { push: { tags: ['v*'] } }
#   jobs:
#     release:
#       uses: virtualparadoxorg/ci-workflows/.github/workflows/maven-central-release.yml@v1
#       with:
#         maven-args: "-DexcludeArtifacts=foo,bar"   # optional, per-repo
#       secrets: inherit

on:
  workflow_call:
    inputs:
      java-version:
        description: "JDK version to build and release with."
        type: string
        default: "21"
      maven-args:
        description: "Extra Maven arguments appended to the deploy (e.g. -DexcludeArtifacts=...)."
        type: string
        default: ""
      version-properties:
        description: "Comma-separated pom property names to also set to the released version (e.g. a literal build-config version a parent pins). Lets a project keep 0-SNAPSHOT in source with no manual bumps."
        type: string
        default: ""
      run-security:
        description: "Run the OWASP dependency-check (security profile) as part of the release."
        type: boolean
        default: true
      run-sbom:
        description: "Generate the CycloneDX SBOM (sbom profile)."
        type: boolean
        default: true
    secrets:
      CENTRAL_TOKEN_ID:
        required: true
      CENTRAL_TOKEN_PASSWORD:
        required: true
      GPG_PRIVATE_KEY:
        required: true
      GPG_PASSPHRASE:
        required: true
      NVD_API_KEY:
        required: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ inputs.java-version }}
          cache: maven
          # Writes ~/.m2/settings.xml with a 'central' server bound to the env vars below,
          # and imports the GPG signing key.
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Derive version from tag
        id: ver
        run: |
          ref="${GITHUB_REF_NAME}"
          case "$ref" in
            v[0-9]*) ;;
            *) echo "::error::Tag '$ref' must look like vX.Y.Z[-qualifier]"; exit 1 ;;
          esac
          version="${ref#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Releasing version $version (from tag $ref)"

      - name: Set version from tag (transient — not committed)
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          VERSION_PROPERTIES: ${{ inputs.version-properties }}
        run: |
          ./mvnw -B -ntp versions:set -DnewVersion="$VERSION" -DgenerateBackupPoms=false -DprocessAllModules=true
          IFS=',' read -ra props <<< "$VERSION_PROPERTIES"
          for p in "${props[@]}"; do
            p="$(echo "$p" | xargs)"
            if [ -n "$p" ]; then
              echo "Setting property $p = $VERSION"
              ./mvnw -B -ntp versions:set-property -Dproperty="$p" -DnewVersion="$VERSION" -DgenerateBackupPoms=false
            fi
          done

      - name: Build, verify, and publish to Maven Central
        run: ./mvnw -B -ntp -Prelease${{ inputs.run-security && ',security' || '' }}${{ inputs.run-sbom && ',sbom' || '' }} ${{ inputs.maven-args }} deploy
        env:
          MAVEN_USERNAME: ${{ secrets.CENTRAL_TOKEN_ID }}
          MAVEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
